PRO_E3b:
  base: OperatorTemplate
  equations:
  - m_outC = m_max / (1 + exp(r*(V_thr - (v+v_bIn))))
  variables:
    m_outC: output
    v: input
    v_bIn: input
    r: 0.12782346
    V_thr: 32.10540543
    m_max: 31.39696397
connectivity_E3b:
  base: OperatorTemplate
  equations:
  - m_out = (g*bEI/connect_reverse_factor)*m_outC
  variables:
    m_out: output
    g: input
    bEI: input
    m_outC: input
    connect_reverse_factor: 6448
RPO_E3b:
  base: OperatorTemplate
  equations:
