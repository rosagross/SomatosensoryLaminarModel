PRO_E3b:
  base: OperatorTemplate
  equations:
  - m_out = m_max / (1 + exp(r*(V_thr - v)))
  variables:
    m_out: output
    v: input
    r: 0.12782346
    V_thr: 32.10540543
    m_max: 31.39696397
RPO_E3b:
  base: OperatorTemplate
  equations:
  - d/dt * v = i
  - d/dt * i = H/tau * (m_in ) - 2 * i/tau - v/tau^2
  variables:
    v: output
    i: variable
    m_in: input
    tau: 0.006
    H: 1.0
